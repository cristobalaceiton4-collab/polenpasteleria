<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INICIO</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: rgb(0, 146, 165);
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .inicio {
            text-align: center;
            padding: 40px 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- TÍTULO ELEGANTE --- */
        .inicio h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-style: italic;
            margin-top: 10px;
            margin-bottom: 40px;
            font-size: 42px; /* Celular */
            line-height: 1.1;
        }

        @media (min-width: 768px) {
            .inicio h1 { font-size: 80px; } /* PC */
        }

        /* --- CONTENEDOR DE BOTONES --- */
        .contenedor-botones {
            display: flex;
            flex-direction: column; /* Apilados en celular para mejor alcance */
            width: 100%;
            max-width: 350px; /* Ancho cómodo en celular */
            gap: 15px;
            margin-bottom: 60px;
        }

        @media (min-width: 768px) {
            .contenedor-botones {
                flex-direction: row; /* En línea para PC */
                flex-wrap: wrap;
                justify-content: center;
                max-width: 1100px;
            }
        }

        /* --- BOTONES GRANDES --- */
        .btn-base {
            background-color: transparent;
            color: white;
            border: 2px solid white;
            padding: 18px 20px; /* Más altos para celular */
            font-size: 18px; /* Texto más legible en móvil */
            font-weight: 500;
            cursor: pointer;
            border-radius: 12px; /* Menos redondeados, más modernos */
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (min-width: 768px) {
            .btn-base {
                padding: 22px 40px;
                font-size: 20px;
                min-width: 280px;
                border-radius: 50px; /* Volvemos a cápsula en PC */
            }
        }

        .btn-base:hover {
            background-color: white;
            color: rgb(0, 95, 107);
            transform: scale(1.03);
        }

        /* Botón Instagram */
        .btn-agenda {
            background-color: rgba(255, 255, 255, 0.1); /* Sutil fondo para diferenciarlo */
            font-weight: 600;
        }

        .btn-agenda svg {
            width: 24px;
            height: 24px;
            fill: white;
            transition: fill 0.3s ease;
        }

        .btn-agenda:hover svg {
            fill: rgb(0, 95, 107);
        }

        /* --- FOOTER INFO --- */
        .info-footer {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-item {
            margin-bottom: 25px;
        }

        .info-item strong {
            display: block;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 3px;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.6);
        }

        .info-item p {
            margin: 5px 0;
            font-size: 17px;
            font-weight: 300;
        }

        @media (min-width: 768px) {
            .info-footer {
                display: flex;
                justify-content: center;
                gap: 100px;
            }
        }
    </style>
</head>

<body>

</html>
